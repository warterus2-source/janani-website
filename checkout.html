<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout JANANI</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
color:#d32f2f;
text-align:center;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<h1>Checkout</h1>

<form action="payment.html">

<label>Nama Lengkap</label>
<input type="text" required>

<label>Nomor WhatsApp</label>
<input type="text" required>

<label>Alamat Pemasangan</label>
<textarea required></textarea>

<label>Pilih Paket</label>
<select>
<option>Up To 7 Mbps - Rp160.000</option>
<option>Up To 15 Mbps - Rp225.000</option>
<option>Up To 30 Mbps - Rp290.000</option>
<option>Up To 50 Mbps - Rp365.000</option>
</select>

<button type="submit">
Lanjut ke Pembayaran
</button>

</form>

</div>

</body>
</html>
